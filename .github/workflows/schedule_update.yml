name: 財報自動更新排程

on:
  schedule:
    # 台灣時間每天 08:00 (UTC 00:00) 與 15:00 (UTC 07:00) 自動執行
    - cron: '0 0,7 * * *'
  workflow_dispatch: 

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: 下載程式碼
        uses: actions/checkout@v3

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安裝所需套件
        run: |
          pip install requests gspread google-auth urllib3

      - name: 執行資料更新程式
        env:
          GOOGLE_KEY_JSON: ${{ secrets.GOOGLE_KEY_JSON }}
        run: python update_finance.py
